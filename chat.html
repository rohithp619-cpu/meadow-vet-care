<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Meadow — AI Assistant · Meadow Vet Care</title>
<meta name="description" content="Chat with Meadow, the friendly AI assistant for Meadow Vet Care." />

<script src="https://cdn.tailwindcss.com?plugins=typography"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<script src="config.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

<style>
  :root {
    --background: #f6f9f1;
    --foreground: #1e2a22;
    --card: #ffffff;
    --muted: #eef2e7;
    --muted-foreground: #5f6b60;
    --border: #dfe6d5;
    --primary: #2f7a4d;
    --primary-foreground: #f6f9f1;
    --secondary: #e7efd9;
    --accent: #e5a94b;
    --destructive: #b23b2e;
    --shadow-warm: 0 20px 60px -20px rgba(47,122,77,0.35);
    --shadow-card: 0 8px 30px -12px rgba(30,42,34,0.18);
  }
  html, body { background: var(--background); color: var(--foreground); font-family: "Inter", ui-sans-serif, system-ui, sans-serif; }
  .font-serif { font-family: "Fraunces", ui-serif, Georgia, serif; }
  .bg-background { background: var(--background); }
  .bg-card { background: var(--card); }
  .bg-muted { background: var(--muted); }
  .bg-secondary { background: var(--secondary); }
  .bg-secondary-70 { background: rgba(231,239,217,0.7); }
  .bg-primary { background: var(--primary); }
  .bg-primary-10 { background: rgba(47,122,77,0.10); }
  .bg-destructive-5 { background: rgba(178,59,46,0.06); }
  .text-foreground { color: var(--foreground); }
  .text-muted-foreground { color: var(--muted-foreground); }
  .text-primary { color: var(--primary); }
  .text-primary-foreground { color: var(--primary-foreground); }
  .text-destructive { color: var(--destructive); }
  .border-border { border-color: var(--border); }
  .border-primary-40 { border-color: rgba(47,122,77,0.40); }
  .border-destructive-30 { border-color: rgba(178,59,46,0.30); }
  .ring-primary-10 { --tw-ring-color: rgba(47,122,77,0.10); }
  .shadow-warm { box-shadow: var(--shadow-warm); }
  .shadow-card { box-shadow: var(--shadow-card); }

  .card-hover { transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease; }
  .btn-scale { transition: transform .15s ease; }
  .btn-scale:hover { transform: scale(1.02); }

  /* assistant markdown */
  .prose a { color: var(--primary); text-decoration: underline; }
  .prose { color: var(--foreground); }
  .prose :where(p, ul, ol):first-child { margin-top: 0; }
  .prose :where(p, ul, ol):last-child { margin-bottom: 0; }

  /* typing dots */
  @keyframes bounceDot { 0%, 80%, 100% { transform: translateY(0); opacity: .35; } 40% { transform: translateY(-4px); opacity: 1; } }
  .dot { width: 6px; height: 6px; border-radius: 9999px; background: var(--muted-foreground); animation: bounceDot 1.2s infinite ease-in-out; }
  .dot:nth-child(2) { animation-delay: .15s; }
  .dot:nth-child(3) { animation-delay: .3s; }

  #transcript { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
</style>
</head>
<body>
<div id="root" class="flex h-[100dvh] overflow-hidden"></div>

<script>
"use strict";

/* ------------------------------------------------------------------ config */
const STORAGE_KEY = "meadow-vet-chat-threads-v1";
const API_BASE = (window.MEADOW_CONFIG && window.MEADOW_CONFIG.apiBase) || "";
const CLINIC_PHONE = "+353 1 000 0000";
const SUGGESTIONS = [
  { icon: "📅", text: "How do I book an appointment for my dog?" },
  { icon: "🐇", text: "My rabbit hasn't eaten today — should I worry?" },
  { icon: "🩺", text: "What's included in a wellness exam?" },
  { icon: "🦜", text: "Do you treat birds and small mammals?" }
];

const PAW_SVG = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-full w-full p-1.5"><circle cx="11" cy="4" r="2"/><circle cx="18" cy="8" r="2"/><circle cx="4" cy="8" r="2"/><circle cx="7.5" cy="14.5" r="2"/><circle cx="14.5" cy="14.5" r="2"/><path d="M8 21c0-2 4-3 4-3s4 1 4 3-1.5 2-4 2-4-1-4-2z"/></svg>';
const USER_SVG = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-full w-full p-1.5"><path d="M14 19a6 6 0 0 0-12 0"/><circle cx="8" cy="9" r="4"/><path d="M22 19a6 6 0 0 0-6-6 4 4 0 1 0 0-8"/></svg>';

/* ------------------------------------------------------------------ helpers */
const esc = (s) => s.replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
const newId = (p) => `${p}_${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 7)}`;
const renderMarkdown = (t) => DOMPurify.sanitize(marked.parse(t, { breaks: true }));

function deriveTitle(thread) {
  const first = thread.messages.find((m) => m.role === "user");
  if (!first) return "New chat";
  const t = first.content.trim().replace(/\s+/g, " ");
  return t.length > 42 ? t.slice(0, 42) + "…" : t;
}

/* ------------------------------------------------------------------ storage */
function loadThreads() {
  try {
    const raw = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
    if (!Array.isArray(raw)) return [];
    return raw.sort((a, b) => b.updatedAt - a.updatedAt);
  } catch { return []; }
}
function saveThreads() {
  threads.sort((a, b) => b.updatedAt - a.updatedAt);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(threads));
}
function persist(thread) {
  thread.title = deriveTitle(thread);
  thread.updatedAt = Date.now();
  saveThreads();
}

/* ------------------------------------------------------------------ state */
let threads = loadThreads();
let currentId = null;
let status = "ready";        // ready | submitted | streaming | error
let errorMessage = "";
let abortController = null;
let pendingPrompt = null;

/* ------------------------------------------------------------------ routing */
// Hash-based so it works on any static host (e.g. GitHub Pages) and survives
// reloads/deep-links: "#/" = welcome, "#/<threadId>" = a conversation.
function threadHash(id) { return "#/" + encodeURIComponent(id); }

function navigate(hash, replace = false) {
  if (replace) { history.replaceState({}, "", hash); route(); }
  else if (location.hash === hash) { route(); }
  else { location.hash = hash; }   // triggers hashchange -> route()
}
window.addEventListener("hashchange", route);

function route() {
  status = "ready"; errorMessage = "";
  const id = decodeURIComponent(location.hash.replace(/^#\/?/, ""));
  if (id) {
    const thread = threads.find((t) => t.id === id);
    if (!thread) return navigate("#/", true);
    currentId = id;
    renderChatView(thread);
  } else {
    currentId = null;
    if (threads.length) return navigate(threadHash(threads[0].id), true);
    renderWelcomeView();
  }
}

/* ------------------------------------------------------------------ actions */
function createThread() {
  const thread = { id: newId("t"), title: "New chat", updatedAt: Date.now(), messages: [] };
  threads.unshift(thread);
  saveThreads();
  navigate(threadHash(thread.id));
}

function startFromSuggestion(prompt) {
  const thread = { id: newId("t"), title: "New chat", updatedAt: Date.now(), messages: [] };
  threads.unshift(thread);
  saveThreads();
  pendingPrompt = { id: thread.id, text: prompt };
  navigate(threadHash(thread.id));
}

function deleteThread(id) {
  const idx = threads.findIndex((t) => t.id === id);
  if (idx === -1) return;
  const wasActive = id === currentId;
  threads.splice(idx, 1);
  saveThreads();
  if (wasActive) {
    if (abortController) abortController.abort();
    navigate(threads.length ? threadHash(threads[0].id) : "#/", true);
  } else {
    renderSidebarList();
  }
}

/* ------------------------------------------------------------------ views */
function sidebarHTML() {
  return `
  <aside class="hidden w-72 shrink-0 flex-col border-r border-border bg-background md:flex">
    <div class="flex flex-col gap-4 p-4">
      <a href="index.html" class="inline-flex items-center gap-2 text-sm font-medium text-muted-foreground hover:text-foreground">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Back to site
      </a>
      <button data-action="new" class="inline-flex items-center justify-center gap-2 rounded-full bg-primary px-4 py-2.5 text-sm font-semibold text-primary-foreground shadow-warm btn-scale">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New chat
      </button>
    </div>
    <div class="px-4 pb-2 text-xs font-semibold uppercase tracking-wider text-muted-foreground">Conversations</div>
    <div id="thread-list" class="flex-1 overflow-y-auto px-2 pb-2">${threadListHTML()}</div>
    <div class="flex items-center gap-2 border-t border-border px-4 py-3 text-xs text-muted-foreground">
      <span class="grid h-5 w-5 place-items-center rounded-full bg-primary text-primary-foreground">${PAW_SVG}</span>
      Meadow Vet Care · AI Assistant
    </div>
  </aside>`;
}

function threadListHTML() {
  if (!threads.length) {
    return `<p class="px-3 py-8 text-center text-sm text-muted-foreground">No chats yet. Start a new conversation.</p>`;
  }
  return threads.map((t) => {
    const active = t.id === currentId;
    return `
    <div class="group relative">
      <a href="${threadHash(t.id)}" class="flex items-center gap-2 rounded-xl px-3 py-2.5 pr-9 text-sm ${active ? "bg-card shadow-card font-medium" : "hover:bg-muted"}">
        <span class="shrink-0 ${active ? "text-primary" : "text-muted-foreground"}">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </span>
        <span class="truncate">${esc(t.title || "New chat")}</span>
      </a>
      <button data-action="delete" data-id="${t.id}" aria-label="Delete ${esc(t.title || "chat")}"
        class="absolute right-2 top-1/2 -translate-y-1/2 grid h-6 w-6 place-items-center rounded-md text-muted-foreground opacity-0 transition hover:bg-muted hover:text-destructive group-hover:opacity-100">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
      </button>
    </div>`;
  }).join("");
}

function renderWelcomeView() {
  document.getElementById("root").innerHTML = `
  ${sidebarHTML()}
  <main class="flex min-w-0 flex-1 flex-col items-center overflow-y-auto">
    <div class="flex w-full max-w-2xl flex-1 flex-col items-center justify-center px-4 py-12 text-center">
      <span class="grid h-16 w-16 place-items-center rounded-3xl bg-primary text-primary-foreground shadow-warm">${PAW_SVG}</span>
      <h1 class="mt-6 font-serif text-4xl font-semibold tracking-tight">Hi, I'm <span class="text-primary">Meadow</span>.</h1>
      <p class="mt-3 max-w-md text-muted-foreground">Your friendly AI assistant for Meadow Vet Care. Ask me anything about services, hours, or your pet.</p>
      <div class="mt-8 grid w-full gap-3 sm:grid-cols-2">
        ${SUGGESTIONS.map((s) => `
        <button data-action="suggest" data-prompt="${esc(s.text)}" class="card-hover group flex items-start gap-3 rounded-2xl border border-border bg-card p-4 text-left hover:-translate-y-0.5 hover:shadow-card" style="border-color:var(--border)">
          <span class="grid h-9 w-9 shrink-0 place-items-center rounded-xl bg-secondary text-lg transition group-hover:bg-primary">${s.icon}</span>
          <span class="text-sm font-medium leading-snug">${esc(s.text)}</span>
        </button>`).join("")}
      </div>
      <button data-action="new" class="mt-6 inline-flex items-center gap-2 rounded-full bg-primary px-6 py-3 text-sm font-semibold text-primary-foreground shadow-warm btn-scale">
        Start a new chat
      </button>
      <a href="index.html" class="mt-6 text-sm text-muted-foreground hover:text-foreground md:hidden">← Back to site</a>
    </div>
  </main>`;
}

function renderChatView(thread) {
  document.getElementById("root").innerHTML = `
  ${sidebarHTML()}
  <main class="flex min-w-0 flex-1 flex-col">
    <header class="flex items-center justify-between gap-3 border-b border-border px-4 py-3 md:px-6">
      <div class="flex min-w-0 items-center gap-3">
        <span class="grid h-9 w-9 shrink-0 place-items-center rounded-full bg-primary text-primary-foreground shadow-warm">${PAW_SVG}</span>
        <div class="min-w-0">
          <div id="header-title" class="truncate font-serif text-base font-semibold leading-tight">${esc(thread.title || "New chat")}</div>
          <div class="flex items-center gap-1.5 text-xs text-muted-foreground">
            <span class="inline-block h-1.5 w-1.5 rounded-full" style="background:#3fbf6a"></span>
            Meadow · online now
          </div>
        </div>
      </div>
      <button data-action="new" class="inline-flex items-center gap-1.5 rounded-full bg-secondary px-3 py-1.5 text-xs font-semibold text-foreground md:hidden">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New
      </button>
    </header>

    <div id="transcript" class="flex-1 overflow-y-auto">
      <div class="mx-auto max-w-3xl px-4 py-6 md:px-6">
        <div id="messages" class="space-y-6">${messagesHTML(thread)}</div>
      </div>
    </div>

    <div class="border-t border-border bg-background px-4 py-3 md:px-6">
      <div class="mx-auto max-w-3xl">
        <form id="composer" class="flex items-end gap-2 rounded-2xl border border-border bg-card p-2 shadow-card transition focus-within:border-primary-40 focus-within:ring-2 focus-within:ring-primary-10">
          <textarea id="input" rows="1" placeholder="Message Meadow…"
            class="max-h-48 min-h-[40px] flex-1 resize-none bg-transparent px-2 py-2 text-sm leading-relaxed outline-none"></textarea>
          <button type="submit" id="send-btn" aria-label="Send"
            class="grid h-10 w-10 shrink-0 place-items-center rounded-xl bg-primary text-primary-foreground shadow-warm btn-scale disabled:opacity-40">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
          </button>
          <button type="button" id="stop-btn" aria-label="Stop" class="hidden h-10 w-10 shrink-0 place-items-center rounded-xl bg-secondary text-foreground">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" stroke="none"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
          </button>
        </form>
        <p class="mt-2 text-center text-xs text-muted-foreground">Meadow can make mistakes. For urgent concerns, call the clinic at ${CLINIC_PHONE}.</p>
      </div>
    </div>
  </main>`;

  wireComposer();
  syncComposerButtons();
  scrollToBottom(false);

  // Auto-send a suggestion prompt once, if one is queued for this thread.
  if (pendingPrompt && pendingPrompt.id === thread.id) {
    const text = pendingPrompt.text;
    pendingPrompt = null;
    sendMessage(text);
  } else {
    focusInput();
  }
}

function messagesHTML(thread) {
  if (!thread.messages.length && status !== "submitted") {
    return `
    <div class="mx-auto my-8 max-w-lg">
      <div class="rounded-3xl border border-dashed border-border p-8 text-center">
        <span class="mx-auto grid h-12 w-12 place-items-center rounded-2xl bg-secondary text-primary">${PAW_SVG}</span>
        <h2 class="mt-4 font-serif text-lg font-semibold">How can I help you and your pet today?</h2>
        <p class="mt-1 text-sm text-muted-foreground">Ask about services, opening hours, or general pet care.</p>
      </div>
      <p class="mt-6 mb-2 px-1 text-xs font-semibold uppercase tracking-wider text-muted-foreground">Try asking</p>
      <div class="grid gap-2 sm:grid-cols-2">
        ${SUGGESTIONS.map((s) => `
        <button data-action="send-suggestion" data-prompt="${esc(s.text)}"
          class="card-hover group flex items-start gap-2.5 rounded-2xl border border-border bg-card p-3 text-left hover:-translate-y-0.5 hover:shadow-card">
          <span class="grid h-8 w-8 shrink-0 place-items-center rounded-xl bg-secondary text-base transition group-hover:bg-primary">${s.icon}</span>
          <span class="text-sm font-medium leading-snug">${esc(s.text)}</span>
        </button>`).join("")}
      </div>
    </div>`;
  }
  let html = thread.messages.map(bubbleHTML).join("");
  if (status === "submitted") html += typingHTML();
  if (status === "error") html += errorHTML();
  return html;
}

function bubbleHTML(m) {
  const isUser = m.role === "user";
  const avatar = `<span class="mt-0.5 grid h-8 w-8 shrink-0 place-items-center rounded-full ${isUser ? "bg-secondary text-foreground" : "bg-primary text-primary-foreground shadow-warm"}">${isUser ? USER_SVG : PAW_SVG}</span>`;
  const bubble = isUser
    ? `<div class="max-w-[85%] whitespace-pre-wrap rounded-2xl rounded-tr-sm bg-primary px-4 py-2.5 text-sm leading-relaxed text-primary-foreground">${esc(m.content)}</div>`
    : `<div class="prose prose-sm max-w-[85%] rounded-2xl rounded-tl-sm bg-secondary-70 px-4 py-2.5 leading-relaxed">${m.content ? renderMarkdown(m.content) : ""}</div>`;
  return `<div class="flex items-start gap-3 ${isUser ? "flex-row-reverse" : ""}">${avatar}${bubble}</div>`;
}

function typingHTML() {
  return `
  <div class="flex items-start gap-3">
    <span class="mt-0.5 grid h-8 w-8 shrink-0 place-items-center rounded-full bg-primary text-primary-foreground shadow-warm">${PAW_SVG}</span>
    <div class="flex items-center gap-1.5 rounded-2xl rounded-tl-sm bg-secondary-70 px-4 py-3.5">
      <span class="dot"></span><span class="dot"></span><span class="dot"></span>
    </div>
  </div>`;
}

function errorHTML() {
  return `
  <div class="rounded-2xl border border-destructive-30 bg-destructive-5 px-4 py-3 text-sm text-destructive">
    ${esc(errorMessage || "Something went wrong.")}
  </div>`;
}

/* ------------------------------------------------------------------ chat io */
function currentThread() { return threads.find((t) => t.id === currentId); }

function renderMessages() {
  const thread = currentThread();
  const el = document.getElementById("messages");
  if (thread && el) el.innerHTML = messagesHTML(thread);
}

function renderSidebarList() {
  const el = document.getElementById("thread-list");
  if (el) el.innerHTML = threadListHTML();
}

function syncComposerButtons() {
  const send = document.getElementById("send-btn");
  const stop = document.getElementById("stop-btn");
  const input = document.getElementById("input");
  if (!send || !stop || !input) return;
  const busy = status === "submitted" || status === "streaming";
  send.classList.toggle("hidden", busy);
  stop.classList.toggle("hidden", !busy);
  stop.classList.toggle("grid", busy);
  send.disabled = !input.value.trim();
}

async function sendMessage(text) {
  const content = text.trim();
  const thread = currentThread();
  if (!content || !thread || status === "streaming" || status === "submitted") return;

  thread.messages.push({ id: newId("m"), role: "user", content });
  persist(thread);
  status = "submitted"; errorMessage = "";
  renderMessages(); renderSidebarList();
  document.getElementById("header-title").textContent = thread.title;
  syncComposerButtons(); scrollToBottom();

  const assistant = { id: newId("m"), role: "assistant", content: "" };
  abortController = new AbortController();

  try {
    const res = await fetch(API_BASE + "/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages: thread.messages.map(({ role, content }) => ({ role, content })) }),
      signal: abortController.signal
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: `Request failed (${res.status})` }));
      throw new Error(err.error || `Request failed (${res.status})`);
    }

    thread.messages.push(assistant);
    status = "streaming";
    renderMessages(); syncComposerButtons();

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      assistant.content += decoder.decode(value, { stream: true });
      renderMessages(); scrollToBottom();
    }

    status = "ready";
    if (!assistant.content) assistant.content = "*(no response)*";
    persist(thread);
    renderMessages(); renderSidebarList(); syncComposerButtons();
  } catch (err) {
    if (err.name === "AbortError") {
      status = "ready";
      if (!assistant.content) thread.messages = thread.messages.filter((m) => m !== assistant);
      persist(thread);
      renderMessages(); syncComposerButtons();
    } else {
      status = "error"; errorMessage = err.message;
      renderMessages(); syncComposerButtons(); scrollToBottom();
    }
  } finally {
    abortController = null;
    focusInput();
  }
}

/* ------------------------------------------------------------------ composer */
function wireComposer() {
  const form = document.getElementById("composer");
  const input = document.getElementById("input");
  const stop = document.getElementById("stop-btn");

  const autogrow = () => { input.style.height = "auto"; input.style.height = Math.min(input.scrollHeight, 192) + "px"; };
  input.addEventListener("input", () => { autogrow(); syncComposerButtons(); });
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); submit(); }
  });
  form.addEventListener("submit", (e) => { e.preventDefault(); submit(); });
  stop.addEventListener("click", () => { if (abortController) abortController.abort(); });

  function submit() {
    const text = input.value;
    if (!text.trim() || status === "streaming" || status === "submitted") return;
    input.value = ""; input.style.height = "auto";
    sendMessage(text);
  }
}

function focusInput() {
  const input = document.getElementById("input");
  if (input) input.focus();
}

function scrollToBottom(smooth = true) {
  const el = document.getElementById("transcript");
  if (el) el.scrollTo({ top: el.scrollHeight, behavior: smooth ? "smooth" : "auto" });
}

/* ------------------------------------------------------------------ events */
document.addEventListener("click", (e) => {
  const action = e.target.closest("[data-action]");
  if (!action) return;
  const kind = action.dataset.action;
  if (kind === "new") createThread();
  else if (kind === "suggest") startFromSuggestion(action.dataset.prompt);
  else if (kind === "send-suggestion") sendMessage(action.dataset.prompt);
  else if (kind === "delete") { e.preventDefault(); e.stopPropagation(); deleteThread(action.dataset.id); }
});

/* ------------------------------------------------------------------ boot */
route();
</script>
</body>
</html>
