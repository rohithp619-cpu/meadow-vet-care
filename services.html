<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>All Services — Meadow Vet Care</title>
<meta name="description" content="Browse all 90+ services at Meadow Vet Care — consultations, vaccinations, surgery, dental, grooming and more, for dogs, cats, rabbits, small mammals and birds." />

<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

<style>
  :root {
    --background: #f6f9f1;
    --foreground: #1e2a22;
    --card: #ffffff;
    --muted: #eef2e7;
    --muted-foreground: #5f6b60;
    --border: #dfe6d5;
    --primary: #2f7a4d;
    --primary-foreground: #f6f9f1;
    --secondary: #e7efd9;
    --accent: #e5a94b;
    --shadow-warm: 0 20px 60px -20px rgba(47,122,77,0.35);
    --shadow-card: 0 8px 30px -12px rgba(30,42,34,0.18);
  }
  html, body { background: var(--background); color: var(--foreground); font-family: "Inter", ui-sans-serif, system-ui, sans-serif; }
  .font-serif { font-family: "Fraunces", ui-serif, Georgia, serif; }
  .bg-background { background: var(--background); }
  .bg-card { background: var(--card); }
  .bg-secondary { background: var(--secondary); }
  .bg-primary { background: var(--primary); }
  .bg-primary-10 { background: rgba(47,122,77,0.10); }
  .text-foreground { color: var(--foreground); }
  .text-muted-foreground { color: var(--muted-foreground); }
  .text-primary { color: var(--primary); }
  .text-primary-foreground { color: var(--primary-foreground); }
  .text-accent { color: var(--accent); }
  .border-border { border-color: var(--border); }
  .shadow-warm { box-shadow: var(--shadow-warm); }
  .shadow-card { box-shadow: var(--shadow-card); }
  .card-hover { transition: transform .25s ease, box-shadow .25s ease; }
  .card-hover:hover { transform: translateY(-4px); box-shadow: var(--shadow-card); }
  .chip { transition: background .15s ease, color .15s ease; }
  .chip.active { background: var(--primary); color: var(--primary-foreground); border-color: var(--primary); }
</style>
</head>
<body class="min-h-screen">

<header class="sticky top-0 z-40 border-b border-border backdrop-blur" style="background: rgba(246,249,241,0.85);">
  <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-4 md:px-6">
    <a href="index.html" class="flex items-center gap-2">
      <span class="grid h-9 w-9 place-items-center rounded-full bg-primary text-primary-foreground shadow-warm">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="4" r="2"/><circle cx="18" cy="8" r="2"/><circle cx="4" cy="8" r="2"/><circle cx="7.5" cy="14.5" r="2"/><circle cx="14.5" cy="14.5" r="2"/><path d="M8 21c0-2 4-3 4-3s4 1 4 3-1.5 2-4 2-4-1-4-2z"/></svg>
      </span>
      <span class="font-serif text-xl font-semibold tracking-tight">Meadow Vet Care</span>
    </a>
    <nav class="hidden items-center gap-8 text-sm font-medium text-muted-foreground md:flex">
      <a href="index.html#pets" class="hover:text-foreground">Pets we treat</a>
      <a href="index.html#about" class="hover:text-foreground">About</a>
      <a href="index.html#visit" class="hover:text-foreground">Visit</a>
    </nav>
    <a href="index.html#book" class="inline-flex items-center gap-2 rounded-full bg-primary px-5 py-2.5 text-sm font-semibold text-primary-foreground shadow-warm">Book a visit</a>
  </div>
</header>

<main class="mx-auto max-w-6xl px-4 py-12 md:px-6 md:py-16">
  <div class="max-w-2xl">
    <p class="text-sm font-semibold uppercase tracking-widest text-primary">Full catalogue</p>
    <h1 class="mt-2 font-serif text-4xl font-semibold tracking-tight md:text-5xl">All our services</h1>
    <p class="mt-4 text-muted-foreground">Every service we offer, by pet and category. Prices are guideline prices in euro — your vet will confirm before any treatment.</p>
  </div>

  <!-- Filters -->
  <div class="mt-10 flex flex-col gap-4">
    <div id="species-chips" class="flex flex-wrap gap-2"></div>
    <div class="flex flex-wrap items-center gap-3">
      <select id="category-select" class="rounded-full border border-border bg-card px-4 py-2.5 text-sm font-medium"></select>
      <input id="search" type="search" placeholder="Search services…"
        class="w-full max-w-xs rounded-full border border-border bg-card px-4 py-2.5 text-sm" />
      <span id="count" class="text-sm text-muted-foreground"></span>
    </div>
  </div>

  <div id="grid" class="mt-8 grid gap-4 sm:grid-cols-2 lg:grid-cols-3"></div>
  <div id="empty" class="hidden py-20 text-center text-muted-foreground">No services match those filters.</div>
</main>

<a href="chat.html" aria-label="Chat with Meadow"
   class="fixed bottom-5 right-5 z-50 inline-flex items-center gap-2 rounded-full bg-primary px-5 py-3 text-sm font-semibold text-primary-foreground shadow-warm">
  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
  <span class="hidden sm:inline">Ask Meadow</span>
</a>

<footer class="border-t border-border bg-background">
  <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-8 text-sm text-muted-foreground md:px-6">
    <span>🐾 © <span id="year"></span> Meadow Vet Care</span>
    <a href="index.html" class="hover:text-foreground">← Back to home</a>
  </div>
</footer>

<script>
document.getElementById("year").textContent = new Date().getFullYear();

const SPECIES_EMOJI = { Dog: "🐕", Cat: "🐈", Rabbit: "🐇", "Small mammal": "🐹", Bird: "🐦" };
const eur = new Intl.NumberFormat("en-IE", { style: "currency", currency: "EUR", minimumFractionDigits: 0 });

let services = [];
const state = { species: "All", category: "All", query: "" };

function slotBadge(s) {
  if (!s.requiresAppointment) return '<span class="rounded-full bg-secondary px-2.5 py-1 text-xs font-medium">Walk-in</span>';
  if (s.slotsThisWeek === 0) return '<span class="rounded-full px-2.5 py-1 text-xs font-medium" style="background:#f7e3e0;color:#9c3b2e">Fully booked this week</span>';
  return `<span class="rounded-full bg-primary-10 px-2.5 py-1 text-xs font-medium text-primary">${s.slotsThisWeek} slot${s.slotsThisWeek === 1 ? "" : "s"} this week</span>`;
}

function card(s) {
  return `
  <article class="card-hover flex flex-col rounded-3xl border border-border bg-card p-6">
    <div class="flex items-start justify-between gap-3">
      <div class="flex items-center gap-2 text-xs font-semibold uppercase tracking-wider text-muted-foreground">
        <span>${SPECIES_EMOJI[s.species] || "🐾"}</span><span>${s.species}</span><span>·</span><span>${s.category}</span>
      </div>
      ${s.specialOffer ? `<span class="shrink-0 rounded-full px-2.5 py-1 text-xs font-semibold" style="background:rgba(229,169,75,0.15);color:#8a6420">${s.specialOffer}</span>` : ""}
    </div>
    <h3 class="mt-3 font-serif text-lg font-semibold">${s.name}</h3>
    <p class="mt-1.5 flex-1 text-sm leading-relaxed text-muted-foreground">${s.description}</p>
    <div class="mt-4 flex flex-wrap items-center gap-2">
      <span class="font-serif text-xl font-semibold text-primary">${s.priceEur != null ? eur.format(s.priceEur) : "POA"}</span>
      ${s.durationMin ? `<span class="text-xs text-muted-foreground">· ${s.durationMin} min</span>` : ""}
      <span class="text-xs text-muted-foreground">· ${s.availability}</span>
    </div>
    <div class="mt-3 flex flex-wrap gap-2">${slotBadge(s)}</div>
  </article>`;
}

function apply() {
  const q = state.query.toLowerCase();
  const list = services.filter((s) =>
    (state.species === "All" || s.species === state.species) &&
    (state.category === "All" || s.category === state.category) &&
    (!q || s.name.toLowerCase().includes(q) || s.description.toLowerCase().includes(q) || s.category.toLowerCase().includes(q))
  );
  document.getElementById("grid").innerHTML = list.map(card).join("");
  document.getElementById("empty").classList.toggle("hidden", list.length > 0);
  document.getElementById("count").textContent = `${list.length} of ${services.length} services`;
}

function buildFilters() {
  const speciesList = ["All", ...new Set(services.map((s) => s.species))];
  const chips = document.getElementById("species-chips");
  chips.innerHTML = speciesList.map((sp) =>
    `<button data-species="${sp}" class="chip rounded-full border border-border bg-card px-4 py-2 text-sm font-medium ${sp === "All" ? "active" : ""}">${sp === "All" ? "All pets" : (SPECIES_EMOJI[sp] || "") + " " + sp}</button>`
  ).join("");
  chips.addEventListener("click", (e) => {
    const btn = e.target.closest("button[data-species]");
    if (!btn) return;
    state.species = btn.dataset.species;
    chips.querySelectorAll(".chip").forEach((c) => c.classList.toggle("active", c === btn));
    apply();
  });

  const categories = ["All", ...[...new Set(services.map((s) => s.category))].sort()];
  const select = document.getElementById("category-select");
  select.innerHTML = categories.map((c) => `<option value="${c}">${c === "All" ? "All categories" : c}</option>`).join("");
  select.addEventListener("change", () => { state.category = select.value; apply(); });

  document.getElementById("search").addEventListener("input", (e) => { state.query = e.target.value; apply(); });
}

fetch("./services.json")
  .then((r) => { if (!r.ok) throw new Error(`Failed to load services.json (${r.status})`); return r.json(); })
  .then((data) => { services = data; buildFilters(); apply(); })
  .catch((err) => {
    document.getElementById("grid").innerHTML = "";
    document.getElementById("empty").classList.remove("hidden");
    document.getElementById("empty").textContent = "Could not load services: " + err.message;
  });
</script>
</body>
</html>
